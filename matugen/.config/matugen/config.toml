# matugen config — rewritten to be XDG-friendly for this user
[config]
mode = "dark"
type = "scheme-tonal-spot"

[templates]
[templates.hyprland]
input_path = "${XDG_CONFIG_HOME:-$HOME/.config}/matugen/templates/hyprland.lua"
output_path = "${XDG_CONFIG_HOME:-$HOME/.config}/hypr/modules/colors.lua"

[templates.zed]
input_path = "${XDG_CONFIG_HOME:-$HOME/.config}/matugen/templates/zed-colors.json"
output_path = "${XDG_CONFIG_HOME:-$HOME/.config}/zed/themes/matugen.json"

[templates.waybar]
input_path = "${XDG_CONFIG_HOME:-$HOME/.config}/matugen/templates/waybar.css"
output_path = "${XDG_CONFIG_HOME:-$HOME/.config}/waybar/colors/colors.css"

[templates.rofi]
input_path = "${XDG_CONFIG_HOME:-$HOME/.config}/matugen/templates/rofi.rasi"
output_path = "${XDG_CONFIG_HOME:-$HOME/.config}/rofi/colors/vivendi.rasi"

[templates.kitty]
input_path = "${XDG_CONFIG_HOME:-$HOME/.config}/matugen/templates/kitty.conf"
output_path = "${XDG_CONFIG_HOME:-$HOME/.config}/kitty/colors.conf"

[templates.gtk]
input_path = "${XDG_CONFIG_HOME:-$HOME/.config}/matugen/templates/gtk.css"
output_path = "${XDG_CONFIG_HOME:-$HOME/.config}/gtk-4.0/gtk.css"
