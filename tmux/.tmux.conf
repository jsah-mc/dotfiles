# Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Sessions
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
set -g set-clipboard on
set -g history-limit 100000
set -g escape-time 10
set -g focus-events on
set -g mouse on

# Terminal support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,tmux-256color:RGB,kitty:RGB"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Splits open in the current pane path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane movement
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Windows
bind c new-window -c "#{pane_current_path}"
bind n next-window
bind p previous-window

# Copy mode
setw -g mode-keys vi
bind [ copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "sh -c 'if command -v wl-copy >/dev/null 2>&1; then wl-copy; elif command -v xclip >/dev/null 2>&1; then xclip -selection clipboard; elif command -v xsel >/dev/null 2>&1; then xsel --clipboard --input; else cat >/dev/null; fi'"
bind -T copy-mode-vi Escape send-keys -X cancel

# Status line
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=default,fg=#dee4e1"
set -g status-left-length 60
set -g status-right-length 120
set -g status-left "#[fg=#83d5c4]#[fg=#0e1513,bg=#83d5c4,bold] #S #[fg=#83d5c4,bg=default]"
set -g status-right "#[fg=#abcae4]#[fg=#0e1513,bg=#abcae4] %Y-%m-%d #[fg=#83d5c4,bg=#abcae4]#[fg=#0e1513,bg=#83d5c4,bold] %H:%M #[fg=#83d5c4,bg=default]"
set -g window-status-format " #[fg=#8faaa3]#I:#W "
set -g window-status-current-format "#[fg=#83d5c4] #[fg=#0e1513,bg=#83d5c4,bold]#I:#W#[fg=#83d5c4,bg=default] "
set -g pane-border-style "fg=#595959"
set -g pane-active-border-style "fg=#83d5c4"
set -g message-style "bg=#13201d,fg=#dee4e1"
set -g mode-style "bg=#83d5c4,fg=#0e1513"
